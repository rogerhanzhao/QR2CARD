name: QR2CARDiOS

options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  QR2CARDiOS:
    type: application
    platform: iOS
    sources:
      - path: QR2CARDiOS
    resources:
      - path: Resources/calb_logo.png
      - path: Resources/calb_watermark_outline.png
      - path: Resources/fonts/Manrope-Regular.otf
      - path: Resources/fonts/Manrope-Bold.otf
      - path: Resources/fonts/HarmonyOS_Sans_SC_Regular.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calb.qr2card.ios
        PRODUCT_NAME: QR2CARDiOS
        INFOPLIST_FILE: QR2CARDiOS/Info.plist
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "NO"

schemes:
  QR2CARDiOS:
    build:
      targets:
        QR2CARDiOS: all
    run:
      config: Debug
    archive:
      config: Release
