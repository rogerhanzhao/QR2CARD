name: iOS Build

on:
  push:
    branches:
      - codex/ios-version
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator-app:
    name: Build iOS Simulator App
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate --spec project.yml

      - name: Build simulator app
        run: |
          cd ios
          set -o pipefail
          xcodebuild \
            -project QR2CARDiOS.xcodeproj \
            -scheme QR2CARDiOS \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            build | tee ios-build.log

      - name: Package simulator app
        run: |
          cd ios
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            build/Build/Products/Release-iphonesimulator/QR2CARDiOS.app \
            artifacts/QR2CARDiOS-simulator-app.zip

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QR2CARD-iOS-build-log
          path: ios/ios-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: QR2CARD-iOS-simulator-app
          path: ios/artifacts/QR2CARDiOS-simulator-app.zip
          if-no-files-found: error
          retention-days: 30
